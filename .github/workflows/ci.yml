name: CI

# Non-regression gate. Runs on every PR so a change that re-breaks flight
# (body-frame cmd_vel, SDF accel cap, ipc:host, speed envelope — see
# sim/tests/test_flight_regression.py) fails review before it lands.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync workspace
        run: uv sync --no-progress

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest -q
