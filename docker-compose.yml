services:
  base:
    build:
      context: .
      dockerfile: docker/base.Dockerfile
    image: edth-base:latest

  sim:
    build:
      context: .
      dockerfile: sim/Dockerfile
    image: edth-sim:latest
    depends_on: [base]
    network_mode: host          # ROS2 DDS needs host networking for cross-service topics
    ports:
      - "9002:9002"             # gz-sim websocket server (consumed by gzweb in the browser)
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs

  # Kinematic loop that closes the agent control loop: consumes interceptor
  # waypoints, integrates motion, and feeds back /simulation/ground_truth +
  # /radar/detections + /simulation/engagement. Emits perfect-sensor /gs/tracks
  # and a one-shot /gs/assignments until the real GS lands (pass --no-gs to stop).
  driver:
    image: edth-sim:latest        # reuses the sim image (built by the `sim` service)
    depends_on: [sim]
    network_mode: host
    command: ["python3", "-m", "sim.driver"]
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs

  gzweb:
    build:
      context: gzweb
      dockerfile: Dockerfile
      network: host             # git clone needs host network during build
    image: edth-gzweb:latest
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:80"               # open http://localhost:8080 to view the simulation

  gs:
    build:
      context: .
      dockerfile: gs/Dockerfile
    image: edth-gs:latest
    depends_on: [base]
    network_mode: host
    volumes:
      - ./config:/app/config:ro

  # One process per interceptor (config interceptors.count = 3). Only agent1
  # carries the build; agent2/agent3 reuse the tagged image it produces.
  agent1:
    build:
      context: .
      dockerfile: agent/Dockerfile
    image: edth-agent:latest
    depends_on: [base]
    network_mode: host
    environment:
      - INTERCEPTOR_ID=i1
    volumes:
      - ./config:/app/config:ro

  agent2:
    image: edth-agent:latest
    depends_on: [agent1]
    network_mode: host
    environment:
      - INTERCEPTOR_ID=i2
    volumes:
      - ./config:/app/config:ro

  agent3:
    image: edth-agent:latest
    depends_on: [agent1]
    network_mode: host
    environment:
      - INTERCEPTOR_ID=i3
    volumes:
      - ./config:/app/config:ro

  viz:
    build:
      context: .
      dockerfile: viz/Dockerfile
    image: edth-viz:latest
    depends_on: [base]
    network_mode: host
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
