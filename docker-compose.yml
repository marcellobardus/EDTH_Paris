services:
  base:
    build:
      context: .
      dockerfile: docker/base.Dockerfile
    image: edth-base:latest

  sim:
    build:
      context: .
      dockerfile: sim/Dockerfile
    image: edth-sim:latest
    depends_on: [base]
    network_mode: host          # ROS2 DDS needs host networking for cross-service topics
    ports:
      - "9002:9002"             # gz-sim websocket server (consumed by gzweb in the browser)
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs

  gzweb:
    build:
      context: gzweb
      dockerfile: Dockerfile
      network: host             # git clone needs host network during build
    image: edth-gzweb:latest
    ports:
      - "8080:80"               # open http://localhost:8080 to view the simulation

  gs:
    build:
      context: .
      dockerfile: gs/Dockerfile
    image: edth-gs:latest
    depends_on: [base]
    network_mode: host
    volumes:
      - ./config:/app/config:ro

  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    image: edth-agent:latest
    depends_on: [base]
    network_mode: host
    environment:
      - INTERCEPTOR_ID=i1
    volumes:
      - ./config:/app/config:ro

  viz:
    build:
      context: .
      dockerfile: viz/Dockerfile
    image: edth-viz:latest
    depends_on: [base]
    network_mode: host
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
