server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    # Proxy terrain texture requests to the Gazebo WebSocket server.
    # gzweb strips "file://" from SDF URIs and fetches them as HTTP from this
    # origin; gz-sim serves them on port 9002 after our GZ_SIM_RESOURCE_PATH fix.
    location /app/sim/worlds/assets/ {
        proxy_pass         http://host.docker.internal:9002;
        proxy_http_version 1.1;
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
