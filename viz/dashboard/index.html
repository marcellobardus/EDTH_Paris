<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Interceptor Mind — Common Operational Picture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===========================================================
   INTERCEPTOR MIND — C-UAS Common Operational Picture
   Sober institutional COP. Neutral slate chrome.
   Colour code per NATO APP-6 / MIL-STD-2525:
   BLUE/cyan = friendly (own forces, sensors, effectors) · RED = hostile.
   (Green is reserved for NEUTRAL, yellow for UNKNOWN — none present here.)
   Self-contained local simulation (dock controls).
   =========================================================== */
:root{
  --bg:#090c11;
  --panel:#0e131a;
  --panel2:#121922;
  --line:rgba(255,255,255,.065);
  --line2:rgba(255,255,255,.12);
  --ink:#e9eef5;
  --ink2:#a9b4c2;
  --muted:#6e7a8a;
  --faint:#4c5663;
  --friend:#2ec4ff;
  --friend-soft:rgba(46,196,255,.14);
  --hostile:#ff5d5d;
  --hostile-soft:rgba(255,93,93,.13);
  --warn:#e3a83c;
  --steel:#9aa7b8;
  --r:10px;
  --sans:"IBM Plex Sans",system-ui,sans-serif;
  --mono:"IBM Plex Mono",ui-monospace,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased;overflow:hidden}
.mono{font-family:var(--mono)}

.cop{height:100vh;display:grid;grid-template-rows:64px 1fr auto;position:relative}
.cop::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:5;
  background:radial-gradient(130% 90% at 50% 36%,transparent 62%,rgba(0,0,0,.34))}

/* top bar */
.topbar{display:flex;align-items:center;gap:22px;padding:0 24px;background:var(--panel);border-bottom:1px solid var(--line);z-index:3}
.brand{display:flex;align-items:center;gap:13px}
.brand svg{width:30px;height:30px;flex:none}
.brand .nm{font-weight:600;font-size:18px;letter-spacing:-.01em;line-height:1.05}
.brand .sub{color:var(--muted);font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;margin-top:3px}
.sep{width:1px;height:34px;background:var(--line2);flex:none}
.spacer{flex:1}
.kpis{display:flex;align-items:center;gap:26px}
.kpi{display:flex;flex-direction:column;gap:5px;line-height:1}
.kpi .k{color:var(--faint);text-transform:uppercase;font-size:9.5px;letter-spacing:.16em;font-weight:600}
.kpi .v{font-family:var(--mono);font-size:21px;font-weight:500;font-variant-numeric:tabular-nums;letter-spacing:.01em;color:var(--ink)}
.kpi .v.friend{color:var(--friend)}
.kpi .v.hostile{color:var(--hostile)}
.kpi .v.warn{color:var(--warn)}
.kpi .v.zero{color:var(--faint)}
.simstate{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);
  border:1px solid var(--line2);padding:8px 14px;border-radius:999px}
.simstate.run{color:var(--friend);border-color:rgba(46,196,255,.4)}
.simstate .led{width:7px;height:7px;border-radius:50%;background:currentColor}
.simstate.run .led{box-shadow:0 0 9px var(--friend);animation:pulse 1.3s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* stage */
.stage{display:grid;grid-template-columns:344px 1fr 366px;min-height:0;position:relative;z-index:1}
.panel{background:var(--panel);display:flex;flex-direction:column;min-height:0}
.panel.left{border-right:1px solid var(--line)}
.panel.right{border-left:1px solid var(--line)}

.sec{display:flex;align-items:center;gap:10px;padding:15px 18px 13px;border-bottom:1px solid var(--line);flex:none}
.sec .ti{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink2);font-weight:600}
.sec .ct{margin-left:auto;font-family:var(--mono);color:var(--muted);font-size:11px;letter-spacing:.04em}
.sec .ct b{color:var(--ink);font-weight:600}
.sec .ct.hostile b{color:var(--hostile)}

/* ---- threat queue ---- */
.threats{overflow-y:auto;overflow-x:hidden;flex:1;min-height:0}
.trow{display:grid;grid-template-columns:26px 1fr auto;gap:13px;align-items:center;padding:14px 18px;border-bottom:1px solid var(--line);cursor:pointer;border-left:2px solid transparent;transition:background .12s}
.trow:hover{background:rgba(255,255,255,.025)}
.trow.unasgn{border-left-color:var(--hostile);background:var(--hostile-soft)}
.trow.sel{background:rgba(255,255,255,.05)}
.trow .rk{font-family:var(--mono);font-size:14px;color:var(--faint);font-variant-numeric:tabular-nums;text-align:center}
.trow.unasgn .rk{color:var(--hostile)}
.tid{font-family:var(--mono);font-size:14px;color:var(--ink);letter-spacing:.03em;display:flex;align-items:center;gap:9px}
.tag{font-size:9px;letter-spacing:.12em;padding:3px 7px;border-radius:4px;text-transform:uppercase;font-weight:600}
.tag.hostile{color:#ffbcbc;background:var(--hostile-soft)}
.tsub{display:flex;gap:16px;margin-top:7px;font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.02em}
.tsub b{color:var(--ink2);font-weight:500}
.tsub .eta.urgent b{color:var(--warn)}
.dbar{height:3px;background:rgba(255,255,255,.07);border-radius:2px;margin-top:9px;overflow:hidden}
.dbar i{display:block;height:100%;background:var(--hostile);border-radius:2px}
.dbar i.crit{background:var(--hostile)}.dbar i.high{background:var(--warn)}.dbar i.med{background:var(--steel)}.dbar i.low{background:var(--faint)}
.lvl{font-size:8.5px;letter-spacing:.12em;padding:3px 6px;border-radius:4px;text-transform:uppercase;font-weight:700;font-family:var(--mono)}
.lvl.crit{color:#fff;background:var(--hostile)}
.lvl.high{color:#1a1207;background:var(--warn)}
.lvl.med{color:#0c1116;background:var(--steel)}
.lvl.low{color:var(--muted);background:rgba(255,255,255,.06)}
.tasg{display:flex;flex-direction:column;align-items:flex-end;gap:5px;min-width:58px}
.ipill{font-family:var(--mono);font-size:10px;letter-spacing:.04em;color:var(--friend);border:1px solid rgba(46,196,255,.35);padding:3px 7px;border-radius:4px;white-space:nowrap}
.pkv{font-family:var(--mono);font-size:12px;font-variant-numeric:tabular-nums}
.pkv.hi{color:var(--friend)}.pkv.md{color:var(--warn)}.pkv.lo{color:var(--hostile)}
.queued{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;color:var(--warn);text-transform:uppercase}
.empty{padding:30px 20px;color:var(--faint);font-size:12.5px;letter-spacing:.02em;text-align:center;line-height:1.85}
.empty b{color:var(--ink2);font-weight:600;display:block;margin-top:4px;font-size:13px}

/* ---- map ---- */
.mapwrap{position:relative;min-height:0;overflow:hidden;background:#070a0e}
#map{position:absolute;inset:0;width:100%;height:100%;display:block}
.tag-ov{position:absolute;font-family:var(--mono);z-index:2}
.coord{left:18px;bottom:18px;background:rgba(7,10,14,.74);border:1px solid var(--line);padding:7px 12px;font-size:11px;letter-spacing:.06em;color:var(--ink2);border-radius:var(--r)}
.coord b{color:var(--ink)}
.why{right:18px;bottom:18px;max-width:340px;background:rgba(10,14,19,.92);border:1px solid var(--line2);border-radius:var(--r);padding:12px 14px;display:none;flex-direction:column;gap:6px;box-shadow:0 12px 40px rgba(0,0,0,.5)}
.why.on{display:flex}
.why .wl{font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--steel);text-transform:uppercase}
.why .wt{font-size:13px;color:var(--ink2);line-height:1.5}
.why .wt b{color:var(--ink);font-weight:600}

/* ---- interceptors ---- */
.intc{flex:1;padding:14px 16px;display:flex;flex-direction:column;gap:11px;overflow-y:auto;min-height:0}
.icard{background:var(--panel2);border:1px solid var(--line);border-left:2px solid var(--friend);border-radius:var(--r);padding:13px 14px;cursor:pointer;transition:.12s}
.icard:hover{background:rgba(46,196,255,.05)}
.icard.sel{box-shadow:0 0 0 1px var(--friend);background:rgba(46,196,255,.06)}
.icard.out{border-left-color:var(--faint);opacity:.62}
.ihd{display:flex;align-items:center;gap:9px}
.idot{width:8px;height:8px;border-radius:50%;background:var(--friend);box-shadow:0 0 8px var(--friend);flex:none}
.icard.out .idot{background:var(--faint);box-shadow:none}
.inm{font-weight:600;font-size:15px;letter-spacing:.01em}
.iwpn{font-family:var(--mono);font-size:10px;letter-spacing:.02em;color:var(--muted)}
.ist{margin-left:auto;font-family:var(--mono);font-size:9px;letter-spacing:.12em;padding:4px 8px;border-radius:5px;text-transform:uppercase;font-weight:600}
.ist.rdy{color:var(--friend);background:var(--friend-soft)}
.ist.busy{color:var(--warn);background:rgba(227,168,60,.13)}
.ist.out{color:var(--muted);background:rgba(255,255,255,.05)}
.iammo{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:10px;margin:12px 0 11px}
.albl{font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:var(--faint);text-transform:uppercase}
.abar{height:6px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
.abar i{display:block;height:100%;background:var(--friend);border-radius:3px;transition:width .3s}
.abar i.lo{background:var(--warn)}.abar i.crit{background:var(--hostile)}
.aval{font-family:var(--mono);font-size:12px;font-variant-numeric:tabular-nums;color:var(--ink2)}
.aval.lo{color:var(--warn)}.aval.crit{color:var(--hostile)}
.irow{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
.icell{display:flex;flex-direction:column;gap:4px}
.icell .k{font-family:var(--mono);font-size:8.5px;letter-spacing:.12em;color:var(--faint);text-transform:uppercase}
.icell .v{font-family:var(--mono);font-size:12.5px;color:var(--ink);font-variant-numeric:tabular-nums}
.icell .v.tgt{color:var(--ink)}
.icell .v.hi{color:var(--friend)}.icell .v.md{color:var(--warn)}.icell .v.lo{color:var(--hostile)}

/* ---- log ---- */
.log{flex:1;overflow-y:auto;overflow-x:hidden;min-height:60px}
.lrow{display:flex;gap:11px;padding:9px 18px;border-bottom:1px solid var(--line);font-size:12.5px;color:var(--ink2);letter-spacing:.01em;line-height:1.45}
.lrow .lt{font-family:var(--mono);font-size:10.5px;color:var(--faint);flex:none;padding-top:1px}
.lrow b{color:var(--ink);font-weight:600}
.lrow .ok{color:var(--friend)}.lrow .bad{color:var(--hostile)}.lrow .mut{color:var(--muted)}
.lrow.kill{color:#bfe6cd}.lrow.leak{color:#ffc2c2}

/* ---- dock ---- */
.dock{border-top:1px solid var(--line2);background:var(--panel);z-index:3;display:flex;align-items:center;gap:16px;padding:14px 22px}
.controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ctl{font-family:var(--sans);font-size:12px;font-weight:500;letter-spacing:.02em;color:var(--ink2);background:var(--panel2);border:1px solid var(--line2);border-radius:9px;padding:10px 16px;cursor:pointer;transition:.12s;display:inline-flex;align-items:center;gap:8px}
.ctl:hover{border-color:var(--steel);color:var(--ink)}
.ctl .ic{font-size:13px;line-height:1}
.ctl.primary{background:var(--friend);color:#06140b;border-color:var(--friend);font-weight:600}
.ctl.primary:hover{filter:brightness(1.08);color:#06140b}
.ctl.primary.paused{background:var(--panel2);color:var(--friend);border-color:rgba(46,196,255,.45)}
.ctl.danger:hover{border-color:var(--hostile);color:#ffbcbc}
.ctl-sep{width:1px;height:26px;background:var(--line2);margin:0 4px}
.ctl-toggle{display:inline-flex;align-items:center;gap:9px;font-size:12px;color:var(--muted);letter-spacing:.01em;cursor:pointer;user-select:none}
.ctl-toggle input{accent-color:var(--friend);width:15px;height:15px;cursor:pointer}
.rate{display:inline-flex;align-items:center;gap:10px;font-size:11px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}
.rate input{accent-color:var(--steel);width:104px}
.rate b{font-family:var(--mono);color:var(--ink2);font-weight:500;text-transform:none}

::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:5px}
::-webkit-scrollbar-track{background:transparent}

@media (max-width:1280px){
  .stage{grid-template-columns:300px 1fr 320px}
  .kpis{gap:18px}
}
</style>
</head>
<body>

<div class="cop" data-screen-label="COP">

  <header class="topbar">
    <div class="brand">
      <svg viewBox="0 0 100 100" aria-hidden="true">
        <circle cx="50" cy="50" r="42" fill="none" stroke="var(--steel)" stroke-width="3.4"></circle>
        <path d="M50 10 L57 50 L50 90 L43 50 Z" fill="var(--steel)"></path>
        <path d="M10 50 L50 43 L90 50 L50 57 Z" fill="var(--steel)" opacity=".42"></path>
        <circle cx="50" cy="50" r="5" fill="var(--bg)" stroke="var(--steel)" stroke-width="3.2"></circle>
      </svg>
      <div>
        <div class="nm">Interceptor Mind</div>
        <div class="sub">Common Operational Picture</div>
      </div>
    </div>
    <div class="spacer"></div>
    <div class="kpis">
      <div class="kpi"><span class="k">Hostiles</span><span class="v hostile" id="kHostiles">0</span></div>
      <div class="kpi"><span class="k">Intercepted</span><span class="v friend" id="kKills">0</span></div>
      <div class="kpi"><span class="k">Leakers</span><span class="v hostile" id="kLeakers">0</span></div>
      <div class="kpi"><span class="k">First Impact</span><span class="v warn mono" id="kEta">—</span></div>
    </div>
    <div class="sep"></div>
    <div class="simstate" id="simState"><span class="led"></span><span id="simStateTxt">Paused</span></div>
  </header>

  <div class="stage">

    <!-- left -->
    <aside class="panel left">
      <div class="sec"><span class="ti">Threat Priority</span><span class="ct hostile" id="threatCt"></span></div>
      <div class="threats" id="threats"></div>
      <div class="sec"><span class="ti">Event Log</span><span class="ct" id="logCt"></span></div>
      <div class="log" id="log"></div>
    </aside>

    <!-- center map -->
    <main class="mapwrap">
      <canvas id="map"></canvas>
      <div class="tag-ov coord" id="coord">BRG <b>—</b> · RNG <b>—</b></div>
      <div class="tag-ov why" id="why"></div>
    </main>

    <!-- right -->
    <aside class="panel right">
      <div class="sec"><span class="ti">Interceptors</span><span class="ct" id="intcCt"></span></div>
      <div class="intc" id="intc"></div>
    </aside>
  </div>

  <!-- dock -->
  <footer class="dock">
    <div class="controls">
      <button class="ctl primary paused" id="btnRun"><span class="ic">▶</span><span id="runLbl">Start</span></button>
      <button class="ctl" id="btnReset"><span class="ic">↺</span>Reset</button>
      <span class="ctl-sep"></span>
      <button class="ctl" id="btnIntc"><span class="ic">＋</span>Interceptor</button>
      <button class="ctl danger" id="btnHostile"><span class="ic">＋</span>Shahed</button>
      <span class="ctl-sep"></span>
      <label class="ctl-toggle"><input type="checkbox" id="chkAuto" checked>Continuous arrivals</label>
    </div>
    <div class="spacer"></div>
    <div class="rate">Arrival every <input type="range" id="rngRate" min="2" max="14" step="1" value="6"><b id="rateVal">6 s</b></div>
  </footer>

</div>

<script>
(function () {
  "use strict";

  // ============================================================
  //  COLOURS  (canvas needs literals; CSS owns the chrome)
  // ============================================================
  const C = {
    friend:"#2ec4ff", friendDim:"rgba(46,196,255,",
    hostile:"#ff5d5d", hostileDim:"rgba(255,93,93,",
    warn:"#e3a83c", steel:"#9aa7b8",
    ink:"#e9eef5", muted:"#6e7a8a", faint:"#4c5663",
    ring:"rgba(255,255,255,",
  };
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  const z=n=>String(n).padStart(2,"0");
  const $=s=>document.querySelector(s);
  const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};

  // ============================================================
  //  SIMULATION  (local, self-contained)
  // ============================================================
  const AO = 2600;                     // area-of-operations radius, metres (threat-score normalisation)
  const VIEW = 1200;                   // map view radius, metres — zoomed on the action zone
  const SITE_R = 130;                  // defended footprint, metres
  const IPROF = [
    { name:"SABER",  wpn:"Long-range · 8 cells",   range:1750, ammo:8,  reload:2.6, pk:0.90 },
    { name:"TALON",  wpn:"Medium-range · 12 cells", range:1250, ammo:12, reload:1.8, pk:0.80 },
    { name:"WARDEN", wpn:"Point-defence · 18 cells",range:820,  ammo:18, reload:1.1, pk:0.72 },
  ];

  const SIM = {
    t:0, running:false, auto:true, rate:6, spawnAcc:0,
    hostN:0, intcN:0,
    shaheds:[], interceptors:[], fx:[], log:[],
    stats:{ kills:0, leakers:0, shots:0 },
    logSeq:0,
    events:[], _extEvents:new Set(), _extIntcCount:0,
    sel:{ kind:null, id:null },
  };

  // ---- external-data globals (default: internal simulation, fully backward-compatible) ----
  window.__COP_EXTERNAL = (typeof window.__COP_EXTERNAL==="boolean") ? window.__COP_EXTERNAL : false;
  window.__COP_onControl = window.__COP_onControl || {};        // { start, stop, reset }
  window.__COP_STATE = window.__COP_STATE || { tracks:[], threats:[], interceptors:[], assignments:[], events:[] };

  // Static map geometry, fed once by the bridge from the sim config (the ground truth).
  // null until the scenario loads; the renderer falls back to the centred site glyph.
  let SCENARIO = null;   // { siteRel:[x,y], gsRel:[x,y], radars:[{id,x,y,range}] }

  function logEvent(html, kind){
    SIM.log.unshift({ n:++SIM.logSeq, t:SIM.t, html, kind:kind||"" });
    if (SIM.log.length>60) SIM.log.pop();
  }

  function addInterceptor(){
    const k = SIM.interceptors.length;
    const p = IPROF[k % IPROF.length];
    const ang = -Math.PI/2 + k*2.39996;          // golden-angle spread
    const r = 760 + (k%2)*150;                     // defensive ring, clear of site
    const name = k<IPROF.length ? p.name : p.name+"·"+(Math.floor(k/IPROF.length)+1);
    SIM.interceptors.push({
      id:"IC"+(++SIM.intcN), name, wpn:p.wpn,
      x:Math.cos(ang)*r, y:Math.sin(ang)*r,
      range:p.range, reload:p.reload, pk:p.pk,
      ammo:p.ammo, ammoMax:p.ammo, cool:0,
      target:null, curPk:0, state:"READY", alive:true,
    });
    logEvent(`<b>${name}</b> on station`,"mut");
  }

  function spawnShahed(){
    const ang = Math.random()*Math.PI*2;
    const d = 2300 + Math.random()*250;
    const spd = 46 + Math.random()*44;
    const x = Math.cos(ang)*d, y = Math.sin(ang)*d;
    const toA = Math.atan2(-y,-x) + (Math.random()-0.5)*0.26;
    const id = "S"+z(++SIM.hostN);
    SIM.shaheds.push({
      id, x, y, vx:Math.cos(toA)*spd, vy:Math.sin(toA)*spd,
      trail:[], alive:true, born:SIM.t,
    });
    logEvent(`<span class="bad">Radar contact</span> — <b>${id}</b> inbound`,"");
  }

  const dist = (a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
  const rangeOf = s=>Math.hypot(s.x,s.y);
  const speedOf = s=>Math.hypot(s.vx,s.vy);
  function score(s){ if(s && Number.isFinite(s._severity)) return s._severity; return (1-clamp(rangeOf(s)/AO,0,1))*6 + speedOf(s)/22; }
  function eta(s){ if(s && Number.isFinite(s._eta)) return Math.max(0,s._eta); const d=rangeOf(s)-SITE_R; return Math.max(0, d/(speedOf(s)||1)); }
  // --- telemetry helpers (surface everything the sim publishes) ---
  const altOf = o => Math.max(0, +o.z||0);                              // altitude z (m)
  const speed3 = o => Math.hypot(o.vx||0, o.vy||0, o.vz||0);            // full 3D speed (m/s)
  const bearingOf = o => (Math.atan2(o.x, o.y)*180/Math.PI+360)%360;   // compass bearing site→object (N=up)
  // threat level from time-to-impact: most imminent = most severe
  function threatLevel(e){
    if(e<10) return {lvl:"CRITICAL", cls:"crit"};
    if(e<25) return {lvl:"HIGH",     cls:"high"};
    if(e<60) return {lvl:"MEDIUM",   cls:"med"};
    return     {lvl:"LOW",      cls:"low"};
  }

  function stepSim(dt){
    if (!SIM.running) return;

    // spawn
    if (SIM.auto){ SIM.spawnAcc+=dt; if (SIM.spawnAcc>=SIM.rate){ SIM.spawnAcc=0; spawnShahed(); } }

    // move hostiles + leaker check + trails
    for (let i=SIM.shaheds.length-1;i>=0;i--){
      const s=SIM.shaheds[i]; if(!s.alive) continue;
      s.x+=s.vx*dt; s.y+=s.vy*dt;
      if (SIM.t-(s._tt||0)>0.18){ s._tt=SIM.t; s.trail.push([s.x,s.y]); if(s.trail.length>26) s.trail.shift(); }
      if (rangeOf(s) < SITE_R){
        s.alive=false; SIM.shaheds.splice(i,1);
        SIM.stats.leakers++;
        SIM.fx.push({ type:"impact", x:0, y:0, t:0, dur:0.8 });
        SIM.interceptors.forEach(c=>{ if(c.target===s.id) c.target=null; });
        logEvent(`<span class="bad">Leaker</span> — <b>${s.id}</b> reached the defended site`,"leak");
      }
    }

    const live = SIM.shaheds.filter(s=>s.alive);

    // weapon–target assignment (greedy by threat score)
    SIM.interceptors.forEach(c=>{ if(c.target && !live.find(s=>s.id===c.target)) c.target=null; });
    const taken = new Set(SIM.interceptors.map(c=>c.target).filter(Boolean));
    SIM.interceptors.forEach(c=>{
      c.cool=Math.max(0,c.cool-dt);
      if (c.ammo<=0){ c.target=null; c.state="WINCHESTER"; return; }
      if (!c.target){
        let best=null,bs=-1;
        live.forEach(s=>{ if(taken.has(s.id)) return; const sc=score(s); if(sc>bs){bs=sc;best=s;} });
        if (best){ c.target=best.id; taken.add(best.id); }
      }
    });

    // per-interceptor display Pk + state + firing
    SIM.interceptors.forEach(c=>{
      const s = c.target ? live.find(x=>x.id===c.target) : null;
      if (s){
        const d=dist(c,s);
        const band=clamp(1-Math.abs(d-c.range*0.5)/c.range,0.25,1);
        c.curPk = d<=c.range ? clamp(c.pk*band,0.3,0.97) : clamp(c.pk*band*0.5,0.1,0.5);
        c.state = c.ammo<=0 ? "WINCHESTER" : c.cool>0.05 ? "RELOADING" : "ENGAGING";
        // fire
        if (c.ammo>0 && c.cool<=0.05 && d<=c.range){
          c.ammo--; c.cool=c.reload; SIM.stats.shots++;
          const hit = Math.random() < c.curPk;
          SIM.fx.push({ type:"tracer", ic:c.id, tk:s.id, t:0, dur:clamp(d/1500,0.18,0.6), hit, _ex:s.x, _ey:s.y });
        }
      } else {
        c.curPk=0;
        c.state = c.ammo<=0 ? "WINCHESTER" : c.cool>0.05 ? "RELOADING" : "READY";
      }
    });
  }

  function stepFx(dt){
    for (let k=SIM.fx.length-1;k>=0;k--){
      const f=SIM.fx[k]; f.t+=dt;
      if (f.type==="tracer"){
        const s=SIM.shaheds.find(x=>x.id===f.tk);
        if (s && s.alive){ f._ex=s.x; f._ey=s.y; }
        if (f.t>=f.dur && !f._done){
          f._done=true;
          if (f.hit){
            const tgt=SIM.shaheds.find(x=>x.id===f.tk);
            const ex = tgt?tgt.x:f._ex, ey = tgt?tgt.y:f._ey;
            SIM.fx.push({ type:"burst", x:ex, y:ey, t:0, dur:0.55 });
            if (tgt && tgt.alive){
              tgt.alive=false;
              const idx=SIM.shaheds.indexOf(tgt); if(idx>=0) SIM.shaheds.splice(idx,1);
              SIM.stats.kills++;
              SIM.events.push({timestamp:Date.now(),interceptor_id:f.ic,track_id:f.tk,success:true}); if(SIM.events.length>200) SIM.events.shift();
              SIM.interceptors.forEach(c=>{ if(c.target===f.tk) c.target=null; });
              const who=SIM.interceptors.find(c=>c.id===f.ic);
              logEvent(`<b>${who?who.name:f.ic}</b> intercepted <b>${f.tk}</b> — <span class="ok">destroyed</span>`,"kill");
            }
          } else {
            SIM.events.push({timestamp:Date.now(),interceptor_id:f.ic,track_id:f.tk,success:false}); if(SIM.events.length>200) SIM.events.shift();
          }
        }
        if (f.t>=f.dur+0.05) SIM.fx.splice(k,1);
      } else {
        if (f.t>=f.dur) SIM.fx.splice(k,1);
      }
    }
  }

  function rationale(s){
    if (!s) return "";
    const c = SIM.interceptors.find(x=>x.target===s.id);
    const e = eta(s).toFixed(0);
    if (c){
      const d=dist(c,s);
      const band = d<c.range*0.55 ? "close" : d>c.range ? "beyond range" : "optimal";
      return `<b>${c.name}</b> engaging · Pk <b>${c.curPk.toFixed(2)}</b> · ${band} · impact in <b>${e}s</b>.`;
    }
    return `Unassigned · impact in <b>${e}s</b> · awaiting interceptor.`;
  }

  // sim controls (used by dock)
  function setRunning(v){
    SIM.running = (v==null) ? !SIM.running : !!v;
  }
  function resetSim(){
    SIM.t=0; SIM.spawnAcc=0; SIM.hostN=0; SIM.intcN=0;
    SIM.shaheds.length=0; SIM.interceptors.length=0; SIM.fx.length=0; SIM.log.length=0;
    SIM.stats.kills=0; SIM.stats.leakers=0; SIM.stats.shots=0;
    SIM.running=false; SIM.sel={kind:null,id:null};
    addInterceptor(); addInterceptor();
    logEvent("Scenario reset · 2 interceptors on station","mut");
  }

  // ============================================================
  //  RENDER
  // ============================================================
  let cv,ctx,cw,ch,dpr=1,scale,cx,cy;
  function fit(){
    dpr=Math.min(window.devicePixelRatio||1,2);
    cw=cv.clientWidth; ch=cv.clientHeight;
    cv.width=cw*dpr; cv.height=ch*dpr; ctx.setTransform(dpr,0,0,dpr,0,0);
    const pad=42; scale=Math.max(0.02,(Math.min(cw,ch)/2-pad)/VIEW);
    cx=cw/2; cy=ch/2;
  }
  const PX=(x,y)=>({x:cx+x*scale, y:cy-y*scale});
  const SR=v=>v*scale;
  function fdim(a){return C.friendDim+a+")";}
  function hdim(a){return C.hostileDim+a+")";}
  function ring(a){return C.ring+a+")";}

  function drawRings(){
    [0.25,0.5,0.75,1].forEach((f,i)=>{
      const r=VIEW*f;
      ctx.strokeStyle=ring(0.06 - i*0.008); ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(cx,cy,SR(r),0,Math.PI*2); ctx.stroke();
      ctx.fillStyle=ring(0.22); ctx.font="10px 'IBM Plex Mono',monospace"; ctx.textAlign="center"; ctx.textBaseline="bottom";
      ctx.fillText((r/1000).toFixed(2)+" km", cx, cy-SR(r)-3);
    });
    // bearing ticks
    ctx.strokeStyle=ring(0.10);
    for (let a=0;a<360;a+=30){
      const ra=(a-90)*Math.PI/180, r1=SR(VIEW), r2=SR(VIEW*0.977);
      ctx.beginPath(); ctx.moveTo(cx+r1*Math.cos(ra),cy+r1*Math.sin(ra)); ctx.lineTo(cx+r2*Math.cos(ra),cy+r2*Math.sin(ra)); ctx.stroke();
    }
  }

  // One rotating sweep per radar station, sized to its range. Falls back to a
  // single site sweep only when the scenario geometry hasn't loaded yet.
  function sweepWedge(px,py,R,ang){
    const span=0.46;
    ctx.save(); ctx.translate(px,py); ctx.rotate(ang);
    ctx.beginPath(); ctx.moveTo(0,0);
    for (let a=0;a<=span;a+=span/14) ctx.lineTo(Math.cos(-a)*R, Math.sin(-a)*R);
    ctx.closePath();
    const g=ctx.createLinearGradient(0,0,R,0);
    g.addColorStop(0,fdim(0.15)); g.addColorStop(1,fdim(0));
    ctx.fillStyle=g; ctx.fill();
    ctx.strokeStyle=fdim(0.42); ctx.lineWidth=1.4;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(R,0); ctx.stroke();
    ctx.restore();
  }
  function drawSweep(){
    if (SCENARIO && SCENARIO.radars && SCENARIO.radars.length){
      SCENARIO.radars.forEach((rd,i)=>{
        const p=PX(rd.x,rd.y);
        sweepWedge(p.x, p.y, SR(rd.range), (SIM.t*0.62 + i*2.2)%(Math.PI*2));
      });
      return;
    }
    sweepWedge(cx, cy, SR(VIEW), (SIM.t*0.62)%(Math.PI*2));   // standalone fallback
  }

  function drawSite(){
    const pulse=0.5+0.5*Math.sin(SIM.t*1.7);
    // footprint
    ctx.fillStyle=fdim(0.05+pulse*0.05); ctx.beginPath(); ctx.arc(cx,cy,SR(SITE_R),0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=fdim(0.4); ctx.lineWidth=1.2; ctx.setLineDash([5,5]);
    ctx.beginPath(); ctx.arc(cx,cy,SR(SITE_R),0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
    // radar dish glyph
    ctx.strokeStyle=C.friend; ctx.lineWidth=1.8;
    ctx.beginPath(); ctx.arc(cx,cy-1,8,Math.PI*1.15,Math.PI*1.85); ctx.stroke();
    ctx.fillStyle=C.friend;
    ctx.beginPath(); ctx.moveTo(cx-7,cy+8); ctx.lineTo(cx+7,cy+8); ctx.lineTo(cx+4,cy); ctx.lineTo(cx-4,cy); ctx.closePath(); ctx.fill();
    ctx.fillStyle="rgba(185,222,255,.92)"; ctx.font="600 10px 'IBM Plex Sans',sans-serif"; ctx.textAlign="center"; ctx.textBaseline="top";
    ctx.fillText("DEFENDED SITE", cx, cy+13);
  }

  // Radars from the scenario config — fixed sensor sites + coverage rings.
  function drawRadars(){
    if(!SCENARIO || !SCENARIO.radars) return;
    SCENARIO.radars.forEach(rd=>{
      const p=PX(rd.x,rd.y);
      // coverage ring
      ctx.strokeStyle=ring(0.16); ctx.lineWidth=1; ctx.setLineDash([2,7]);
      ctx.beginPath(); ctx.arc(p.x,p.y,SR(rd.range),0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
      // NATO sensor (radar) glyph: half-dome antenna + radiating signal arcs
      ctx.strokeStyle=C.steel; ctx.lineWidth=1.6;
      for(let k=1;k<=3;k++){ ctx.globalAlpha=1-(k-1)*0.28; ctx.beginPath(); ctx.arc(p.x,p.y+2,2+k*3,Math.PI*1.2,Math.PI*1.8); ctx.stroke(); }
      ctx.globalAlpha=1;
      ctx.fillStyle=C.steel; ctx.beginPath(); ctx.arc(p.x,p.y+2,2.8,Math.PI,0); ctx.fill();   // antenna dome
      ctx.beginPath(); ctx.moveTo(p.x,p.y+2); ctx.lineTo(p.x,p.y+6); ctx.stroke();             // mast
      // label
      ctx.fillStyle="rgba(154,167,184,.92)"; ctx.font="9px 'IBM Plex Mono',monospace";
      ctx.textAlign="center"; ctx.textBaseline="top"; ctx.fillText((rd.id||"RADAR").toUpperCase(), p.x, p.y+8);
    });
  }

  // Ground station — interceptor launch site, distinct from the defended site.
  function drawGroundStation(){
    if(!SCENARIO || !SCENARIO.gsRel) return;
    const p=PX(SCENARIO.gsRel[0], SCENARIO.gsRel[1]);
    ctx.strokeStyle=C.friend; ctx.lineWidth=1.6;
    ctx.strokeRect(p.x-5,p.y-5,10,10);
    ctx.beginPath(); ctx.moveTo(p.x-5,p.y-5); ctx.lineTo(p.x+5,p.y+5); ctx.moveTo(p.x+5,p.y-5); ctx.lineTo(p.x-5,p.y+5); ctx.stroke();
    ctx.fillStyle="rgba(185,222,255,.9)"; ctx.font="9px 'IBM Plex Mono',monospace";
    ctx.textAlign="center"; ctx.textBaseline="bottom"; ctx.fillText("GROUND STATION", p.x, p.y-8);
  }

  // NATO-style friendly missile glyph (effector), pointed along heading `ang`.
  function drawMissile(px,py,ang,stroke,fill,lw){
    const L=10, w=2.7;                     // half-length, half-width
    ctx.save(); ctx.translate(px,py); ctx.rotate(ang);
    // tail fins
    ctx.fillStyle=stroke;
    ctx.beginPath(); ctx.moveTo(-L,-w); ctx.lineTo(-L-3.5,-w-3); ctx.lineTo(-L+2,-w+0.5); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-L, w); ctx.lineTo(-L-3.5, w+3); ctx.lineTo(-L+2, w-0.5); ctx.closePath(); ctx.fill();
    // body + pointed nose (missile silhouette)
    ctx.beginPath();
    ctx.moveTo(-L,-w); ctx.lineTo(L*0.5,-w); ctx.lineTo(L,0); ctx.lineTo(L*0.5,w); ctx.lineTo(-L,w); ctx.closePath();
    ctx.fillStyle=fill; ctx.fill();
    ctx.strokeStyle=stroke; ctx.lineWidth=lw; ctx.lineJoin="round"; ctx.stroke();
    ctx.restore();
  }

  function drawInterceptors(){
    SIM.interceptors.forEach(c=>{
      const p=PX(c.x,c.y), sel=SIM.sel.kind==="intc"&&SIM.sel.id===c.id, on=c.ammo>0&&c.alive;
      // range ring
      ctx.strokeStyle=fdim(sel?0.34:0.12); ctx.lineWidth=1; ctx.setLineDash([4,6]);
      ctx.beginPath(); ctx.arc(p.x,p.y,SR(c.range),0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
      if (sel){ ctx.fillStyle=fdim(0.05); ctx.beginPath(); ctx.arc(p.x,p.y,SR(c.range),0,Math.PI*2); ctx.fill(); }
      // heading: velocity if moving, else toward target, else north (canvas y is inverted)
      let ang;
      if (speed3(c)>0.3) ang=Math.atan2(-(c.vy||0), c.vx||0);
      else { const tg=SIM.shaheds.find(x=>x.id===c.target&&x.alive); ang = tg ? Math.atan2(-(tg.y-c.y), tg.x-c.x) : -Math.PI/2; }
      // marker — single friendly missile (NATO/APP-6 effector)
      drawMissile(p.x, p.y, ang, on?C.friend:C.faint, on?fdim(0.28):"rgba(76,86,99,.2)", sel?2:1.6);
      // label
      ctx.fillStyle = sel?"#eaf6ff":"rgba(190,222,255,.92)"; ctx.font=(sel?"600 ":"")+"11px 'IBM Plex Sans',sans-serif";
      ctx.textAlign="center"; ctx.textBaseline="bottom"; ctx.fillText(c.name, p.x, p.y-13);
      ctx.fillStyle = on?fdim(0.85):"rgba(110,122,138,.85)"; ctx.font="9px 'IBM Plex Mono',monospace"; ctx.textBaseline="top";
      ctx.fillText(`${c.ammo}/${c.ammoMax}`, p.x, p.y+12);
    });
  }

  function drawAssignments(){
    SIM.interceptors.forEach(c=>{
      if (!c.target) return;
      const s=SIM.shaheds.find(x=>x.id===c.target&&x.alive); if(!s) return;
      const a=PX(c.x,c.y), b=PX(s.x,s.y), pk=c.curPk;
      const lblCol = pk>0.6?C.friend : pk>0.38?C.warn : C.hostile;
      // friendly engagement line (own action) — blue, dashed
      ctx.strokeStyle=C.friend; ctx.globalAlpha=0.5; ctx.lineWidth=1; ctx.setLineDash([6,6]); ctx.lineDashOffset=-SIM.t*22;
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
      ctx.setLineDash([]); ctx.lineDashOffset=0; ctx.globalAlpha=1;
      const mx=(a.x+b.x)/2, my=(a.y+b.y)/2, lbl="Pk "+pk.toFixed(2);
      ctx.font="9px 'IBM Plex Mono',monospace"; const w=ctx.measureText(lbl).width;
      ctx.fillStyle="rgba(7,10,14,.85)"; ctx.fillRect(mx-w/2-4,my-7,w+8,14);
      ctx.fillStyle=lblCol; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(lbl,mx,my);
    });
  }

  function drawShaheds(){
    SIM.shaheds.forEach(s=>{
      if (!s.alive) return;
      const p=PX(s.x,s.y), sel=SIM.sel.kind==="threat"&&SIM.sel.id===s.id;
      // trail
      for (let k=1;k<s.trail.length;k++){
        const a=(k/s.trail.length)*0.34, t0=PX(s.trail[k-1][0],s.trail[k-1][1]), t1=PX(s.trail[k][0],s.trail[k][1]);
        ctx.strokeStyle=hdim(a); ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(t0.x,t0.y); ctx.lineTo(t1.x,t1.y); ctx.stroke();
      }
      // velocity vector
      const vn=speedOf(s)||1;
      ctx.strokeStyle=hdim(0.7); ctx.lineWidth=1.2;
      ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x+(s.vx/vn)*16, p.y-(s.vy/vn)*16); ctx.stroke();
      // pulse
      const pulse=0.5+0.5*Math.sin(SIM.t*3+s.x*0.01);
      ctx.strokeStyle=hdim(0.1+pulse*0.16); ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(p.x,p.y,11+pulse*3,0,Math.PI*2); ctx.stroke();
      if (sel){ ctx.strokeStyle="#ffb0b0"; ctx.setLineDash([3,3]); ctx.beginPath(); ctx.arc(p.x,p.y,16,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]); }
      // APP-6 hostile AIR frame — upper half of a diamond, open at the bottom (air track)
      const r=8;
      ctx.beginPath(); ctx.moveTo(p.x-r,p.y); ctx.lineTo(p.x,p.y-2*r); ctx.lineTo(p.x+r,p.y); ctx.closePath();
      ctx.fillStyle=hdim(0.2); ctx.fill();
      ctx.strokeStyle=C.hostile; ctx.lineWidth=sel?2.2:1.7;
      ctx.beginPath(); ctx.moveTo(p.x-r,p.y); ctx.lineTo(p.x,p.y-2*r); ctx.lineTo(p.x+r,p.y); ctx.stroke();
      // labels
      ctx.fillStyle=sel?"#ffe2e2":"rgba(255,180,180,.95)"; ctx.font=(sel?"600 ":"")+"10px 'IBM Plex Mono',monospace";
      ctx.textAlign="left"; ctx.textBaseline="middle"; ctx.fillText(s.id, p.x+r+5, p.y-r-2);
      ctx.fillStyle="rgba(255,150,150,.75)"; ctx.font="9px 'IBM Plex Mono',monospace";
      ctx.fillText("T-"+eta(s).toFixed(0)+"s", p.x+r+5, p.y-r+9);
    });
  }

  function drawFx(){
    SIM.fx.forEach(f=>{
      if (f.type==="tracer"){
        const ic=SIM.interceptors.find(c=>c.id===f.ic); if(!ic) return;
        const a=PX(ic.x,ic.y), b=PX(f._ex,f._ey), prog=clamp(f.t/f.dur,0,1);
        const hx=a.x+(b.x-a.x)*prog, hy=a.y+(b.y-a.y)*prog;
        const tp=clamp(prog-0.2,0,1), tx=a.x+(b.x-a.x)*tp, ty=a.y+(b.y-a.y)*tp;
        ctx.strokeStyle=fdim(0.92); ctx.lineWidth=1.6; ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(hx,hy); ctx.stroke();
        ctx.fillStyle="#eafff3"; ctx.beginPath(); ctx.arc(hx,hy,1.7,0,Math.PI*2); ctx.fill();
      } else if (f.type==="burst"){
        const prog=f.t/f.dur, p=PX(f.x,f.y), r=4+prog*22;
        ctx.strokeStyle=fdim((1-prog)*0.9); ctx.lineWidth=1.8; ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2); ctx.stroke();
        ctx.fillStyle=fdim((1-prog)*0.5); ctx.beginPath(); ctx.arc(p.x,p.y,r*0.4,0,Math.PI*2); ctx.fill();
      } else if (f.type==="impact"){
        const prog=f.t/f.dur;
        ctx.strokeStyle=hdim((1-prog)*0.9); ctx.lineWidth=2.4; ctx.beginPath(); ctx.arc(cx,cy,SR(SITE_R)+prog*28,0,Math.PI*2); ctx.stroke();
      }
    });
  }

  function drawScaleBar(){
    const len=SR(500), x2=cw-30, y2=ch-28, x1=x2-len;
    ctx.strokeStyle=ring(0.4); ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x1,y2); ctx.lineTo(x2,y2); ctx.moveTo(x1,y2-4); ctx.lineTo(x1,y2+1); ctx.moveTo(x2,y2-4); ctx.lineTo(x2,y2+1); ctx.stroke();
    ctx.fillStyle=ring(0.55); ctx.font="9px 'IBM Plex Mono',monospace"; ctx.textAlign="center"; ctx.textBaseline="bottom"; ctx.fillText("0.5 km",(x1+x2)/2,y2-4);
    // north
    const nx=cw-34, ny=34;
    ctx.fillStyle=ring(0.6); ctx.beginPath(); ctx.moveTo(nx,ny-11); ctx.lineTo(nx+5,ny+6); ctx.lineTo(nx,ny+2); ctx.lineTo(nx-5,ny+6); ctx.closePath(); ctx.fill();
    ctx.font="8px 'IBM Plex Mono',monospace"; ctx.textBaseline="top"; ctx.fillText("N",nx,ny+8);
  }

  function render(){
    ctx.clearRect(0,0,cw,ch);
    ctx.fillStyle="#070a0e"; ctx.fillRect(0,0,cw,ch);
    const g=ctx.createRadialGradient(cx,cy-30,0,cx,cy,Math.max(1,SR(2200)));
    g.addColorStop(0,"rgba(28,40,52,.32)"); g.addColorStop(1,"rgba(7,10,14,0)");
    ctx.fillStyle=g; ctx.fillRect(0,0,cw,ch);
    drawRings(); drawSweep(); drawSite();
    drawRadars(); drawGroundStation();
    drawInterceptors(); drawAssignments(); drawShaheds(); drawFx();
    drawScaleBar();
  }

  function hitTest(px,py){
    let best=null,bd=18,kind=null;
    SIM.shaheds.forEach(s=>{ if(!s.alive)return; const p=PX(s.x,s.y); const d=Math.hypot(px-p.x,py-p.y); if(d<bd){bd=d;best=s.id;kind="threat";} });
    SIM.interceptors.forEach(c=>{ const p=PX(c.x,c.y); const d=Math.hypot(px-p.x,py-p.y); if(d<bd){bd=d;best=c.id;kind="intc";} });
    return best?{id:best,kind}:null;
  }

  // ============================================================
  //  UI PANELS
  // ============================================================
  function fmtT(sec){ const m=Math.floor(sec/60), s=Math.floor(sec%60); return `+${z(m)}:${z(s)}`; }

  function updateStats(){
    const live=SIM.shaheds.filter(s=>s.alive);
    const etas=live.map(eta).filter(Number.isFinite);
    const minE=etas.length?Math.min(...etas):null;
    const kH=$("#kHostiles"); kH.textContent=live.length; kH.classList.toggle("zero",live.length===0);
    const kK=$("#kKills"); kK.textContent=SIM.stats.kills; kK.classList.toggle("zero",SIM.stats.kills===0);
    const kL=$("#kLeakers"); kL.textContent=SIM.stats.leakers; kL.classList.toggle("zero",SIM.stats.leakers===0);
    const kE=$("#kEta"); kE.textContent=minE!=null?"T-"+minE.toFixed(0)+"s":"—"; kE.classList.toggle("zero",minE==null);
  }

  function buildThreats(){
    const box=$("#threats");
    // rank by imminence: lowest time-to-impact (most imminent) on top
    const live=SIM.shaheds.filter(s=>s.alive).sort((a,b)=>eta(a)-eta(b));
    $("#threatCt").innerHTML=`<b>${live.length}</b> inbound`;
    if (!live.length){
      box.innerHTML="";
      box.appendChild(el("div","empty", SIM.running
        ? "Sky clear<b>No hostile contacts</b>"
        : "Simulation paused<b>Press Start to begin</b>"));
      return;
    }
    const empty=box.querySelector(".empty"); if(empty) empty.remove();
    const ids=new Set(live.map(s=>s.id));
    [...box.children].forEach(c=>{ if(c.dataset.id && !ids.has(c.dataset.id)) c.remove(); });
    live.forEach((s,rank)=>{
      let row=box.querySelector(`[data-id="${s.id}"]`);
      if (!row){ row=el("div","trow"); row.dataset.id=s.id; row.addEventListener("click",()=>select("threat",s.id)); box.appendChild(row); }
      box.appendChild(row);                       // keep DOM order == imminence order
      const e=eta(s), c=SIM.interceptors.find(x=>x.target===s.id);
      const lv=threatLevel(e), urg=clamp(1-e/90,0.04,1);
      const dist=Math.round(rangeOf(s)), alt=Math.round(altOf(s)), brg=Math.round(bearingOf(s));
      row.className="trow"+(SIM.sel.kind==="threat"&&SIM.sel.id===s.id?" sel":"")+(c?"":" unasgn");
      row.innerHTML=`
        <div class="rk">${z(rank+1)}</div>
        <div>
          <div class="tid">${s.id}<span class="tag hostile">Shahed</span><span class="lvl ${lv.cls}">${lv.lvl}</span></div>
          <div class="tsub">
            <span class="eta ${e<10?'urgent':''}">ETA <b>${e.toFixed(0)}s</b></span>
            <span>SPD <b>${Math.round(speed3(s)||speedOf(s))}</b></span>
            <span>ALT <b>${alt}</b></span>
            <span>BRG <b>${z(brg)}°</b></span>
            <span>RNG <b>${dist}</b></span>
          </div>
          <div class="dbar"><i class="${lv.cls}" style="width:${urg*100}%"></i></div>
        </div>
        <div class="tasg">${c
          ? `<span class="ipill">${c.name}</span><span class="pkv ${c.curPk>0.6?'hi':c.curPk>0.38?'md':'lo'}">${c.curPk.toFixed(2)}</span>`
          : `<span class="queued">Queued</span>`}</div>`;
    });
  }

  let intcSig="";
  function buildIntc(){
    const box=$("#intc");
    const sig=SIM.interceptors.map(c=>c.id).join("|");
    if (sig!==intcSig){
      intcSig=sig; box.innerHTML="";
      SIM.interceptors.forEach(c=>{ const card=el("div","icard"); card.dataset.id=c.id; card.addEventListener("click",()=>select("intc",c.id)); box.appendChild(card); });
    }
    $("#intcCt").innerHTML=`<b>${SIM.interceptors.length}</b> on station`;
    SIM.interceptors.forEach(c=>{
      const card=box.querySelector(`[data-id="${c.id}"]`); if(!card) return;
      const tgt=SIM.shaheds.find(x=>x.id===c.target&&x.alive);
      const out=c.ammo<=0;
      const stCls=c.state==="READY"?"rdy":out?"out":"busy";
      const pct=(c.ammo/c.ammoMax)*100, aC=pct<20?"crit":pct<45?"lo":"";
      // live telemetry straight from the sim (velocity/position broadcast by each agent)
      const spd=Math.round(speed3(c)), alt=Math.round(altOf(c));
      const hdg=(speed3(c)>0.2)?z(Math.round((Math.atan2(c.vx||0,c.vy||0)*180/Math.PI+360)%360))+"°":"—";
      card.className="icard"+(SIM.sel.kind==="intc"&&SIM.sel.id===c.id?" sel":"")+(out?" out":"");
      card.innerHTML=`
        <div class="ihd"><span class="idot"></span><span class="inm">${c.name}</span><span class="iwpn">${c.wpn}</span><span class="ist ${stCls}">${c.state}</span></div>
        <div class="iammo"><div class="albl">Cells</div><div class="abar"><i class="${aC}" style="width:${pct}%"></i></div><div class="aval ${aC}">${c.ammo}/${c.ammoMax}</div></div>
        <div class="irow">
          <div class="icell"><span class="k">Speed</span><span class="v">${spd} m/s</span></div>
          <div class="icell"><span class="k">Alt</span><span class="v">${alt} m</span></div>
          <div class="icell"><span class="k">Hdg</span><span class="v">${hdg}</span></div>
          <div class="icell"><span class="k">Target</span><span class="v tgt">${tgt?tgt.id:"—"}</span></div>
        </div>
        <div class="irow" style="margin-top:9px">
          <div class="icell"><span class="k">Range</span><span class="v">${(c.range/1000).toFixed(1)}km</span></div>
          <div class="icell"><span class="k">Pk</span><span class="v ${c.curPk>0.6?'hi':c.curPk>0.38?'md':'lo'}">${tgt?c.curPk.toFixed(2):"—"}</span></div>
        </div>`;
    });
  }

  let lastLogN=0;
  function buildLog(){
    $("#logCt").textContent = SIM.running?"Live":"Idle";
    const box=$("#log");
    // incremental: only prepend entries newer than what's already shown (no full re-render = no flicker)
    const fresh=SIM.log.filter(e=>e.n>lastLogN).sort((a,b)=>a.n-b.n);
    fresh.forEach(e=>{
      const row=el("div","lrow "+(e.kind||""),`<span class="lt">${fmtT(e.t)}</span><span>${e.html}</span>`);
      box.insertBefore(row, box.firstChild);
    });
    if (fresh.length) lastLogN=fresh[fresh.length-1].n;
    while (box.children.length>40) box.removeChild(box.lastChild);
  }

  function select(kind,id){
    if (kind==="intc"){ const c=SIM.interceptors.find(x=>x.id===id); SIM.sel={kind:"intc",id}; }
    else SIM.sel={kind,id};
    refreshWhy();
  }
  function refreshWhy(){
    const why=$("#why");
    if (SIM.sel.kind==="threat"){
      const s=SIM.shaheds.find(x=>x.id===SIM.sel.id&&x.alive);
      if (s){ why.classList.add("on"); why.innerHTML=`<span class="wl">${s.id} · Hostile</span><span class="wt">${rationale(s)}</span>`; return; }
    } else if (SIM.sel.kind==="intc"){
      const c=SIM.interceptors.find(x=>x.id===SIM.sel.id);
      if (c){ const tgt=SIM.shaheds.find(x=>x.id===c.target&&x.alive);
        why.classList.add("on");
        why.innerHTML=`<span class="wl">${c.name} · Interceptor</span><span class="wt">${tgt?rationale(tgt):`No target · ${c.state.toLowerCase()} · ${c.ammo}/${c.ammoMax} cells.`}</span>`; return; }
    }
    why.classList.remove("on"); why.innerHTML="";
  }

  // ============================================================
  //  CONTROLS
  // ============================================================
  function setRunUI(){
    const b=$("#btnRun"), s=$("#simState");
    $("#runLbl").textContent=SIM.running?"Pause":"Start";
    b.querySelector(".ic").textContent=SIM.running?"⏸":"▶";
    b.classList.toggle("paused",!SIM.running);
    s.classList.toggle("run",SIM.running);
    $("#simStateTxt").textContent=SIM.running?"Running":"Paused";
  }
  function wireControls(){
    const ctl=()=>window.__COP_onControl||{};
    $("#btnRun").addEventListener("click",()=>{
      setRunning(); setRunUI();
      if (window.__COP_EXTERNAL){ const h=ctl(); (SIM.running ? h.start : h.stop) && (SIM.running ? h.start : h.stop)(); }
      else logEvent(SIM.running?"Simulation <b>started</b>":"Simulation <b>paused</b>","mut");
    });
    $("#btnReset").addEventListener("click",()=>{
      if (window.__COP_EXTERNAL){ const h=ctl(); h.reset && h.reset(); SIM.running=false; setRunUI(); return; }
      resetSim(); lastLogN=0; $("#log").innerHTML=""; setRunUI();
    });
    $("#btnIntc").addEventListener("click",()=>{ if(window.__COP_EXTERNAL) return; addInterceptor(); intcSig=""; });
    $("#btnHostile").addEventListener("click",()=>{ if(window.__COP_EXTERNAL) return; spawnShahed(); if(!SIM.running){ setRunning(true); setRunUI(); } });
    $("#chkAuto").addEventListener("change",e=>SIM.auto=e.target.checked);
    const rng=$("#rngRate");
    rng.addEventListener("input",e=>{ SIM.rate=+e.target.value; $("#rateVal").textContent=e.target.value+" s"; });
    SIM.auto=$("#chkAuto").checked; SIM.rate=+rng.value;
  }
  function wireMap(){
    cv.addEventListener("mousemove",e=>{
      const r=cv.getBoundingClientRect(), px=e.clientX-r.left, py=e.clientY-r.top;
      cv.style.cursor=hitTest(px,py)?"pointer":"crosshair";
      const wx=(px-cx)/scale, wy=-(py-cy)/scale;
      const brg=((Math.atan2(wx,wy)*180/Math.PI)+360)%360;
      const rng=Math.round(Math.hypot(wx,wy));
      $("#coord").innerHTML=`BRG <b>${z(Math.round(brg))}°</b> · RNG <b>${rng}</b> m`;
    });
    cv.addEventListener("click",e=>{
      const r=cv.getBoundingClientRect(), hit=hitTest(e.clientX-r.left,e.clientY-r.top);
      if (hit) select(hit.kind,hit.id); else { SIM.sel={kind:null,id:null}; refreshWhy(); }
    });
  }

  // ============================================================
  //  EXTERNAL DATA INTERFACE  (added — does not affect internal mode)
  //    window.__COP_STATE        live snapshot in the documented schema
  //    window.__COP_setData(s)   inject an external snapshot (switches to external mode)
  //    window.__COP_EXTERNAL     true => internal simulation loop is disabled
  //    window.__COP_onControl    { start, stop, reset } callbacks for the dock buttons
  //  World is in metres; the defended site is the fixed point [500, 500, 0].
  // ============================================================
  const SITE_ABS = 500;

  function mapStatus(st, c){
    if (st!=null && st!==""){
      const u=String(st).toUpperCase();
      if(/READY|IDLE|STANDBY/.test(u)) return "READY";
      if(/ENGAG|FIRING|TRACK/.test(u)) return "ENGAGING";
      if(/RELOAD|COOL/.test(u)) return "RELOADING";
      if(/WINCH|EMPTY|NO.?AMMO/.test(u)) return "WINCHESTER";
      if(/DEST|OFF|DEAD|KILL/.test(u)) return "DESTROYED";
      return u;
    }
    return c && c.target ? "ENGAGING" : "READY";
  }

  // translate an external snapshot into the internal SIM model the renderer reads
  function applyExternal(state){
    state = state || {};
    // interceptors
    const seenI=new Set();
    (state.interceptors||[]).forEach(d=>{
      if(!d || d.interceptor_id==null) return;
      const id=d.interceptor_id; seenI.add(id);
      let c=SIM.interceptors.find(x=>x.id===id);
      if(!c){
        const p=IPROF[SIM._extIntcCount % IPROF.length];
        c={ id, name:d.name||p.name, wpn:d.wpn||p.wpn, range:p.range, reload:p.reload, pk:p.pk,
            ammoMax:p.ammo, ammo:p.ammo, cool:0, curPk:0, target:null, alive:true, x:0, y:0, state:"READY" };
        SIM.interceptors.push(c); SIM._extIntcCount++;
      }
      const pos=d.position||[SITE_ABS,SITE_ABS,0];
      c.x=(+pos[0]||SITE_ABS)-SITE_ABS; c.y=(+pos[1]||SITE_ABS)-SITE_ABS; c.z=+pos[2]||0;
      const cv=d.velocity||[0,0,0]; c.vx=+cv[0]||0; c.vy=+cv[1]||0; c.vz=+cv[2]||0;
      if(d.name) c.name=d.name;
      if(d.range!=null) c.range=+d.range;
      if(d.ammo!=null) c.ammo=+d.ammo;
      if(d.ammo_max!=null) c.ammoMax=+d.ammo_max;
      c.alive=d.alive!==false;
      if(d.target_track_id!==undefined) c.target=d.target_track_id;
      c.state=mapStatus(d.status, c);
    });
    for(let i=SIM.interceptors.length-1;i>=0;i--) if(!seenI.has(SIM.interceptors[i].id)) SIM.interceptors.splice(i,1);

    // assignments (authoritative over target_track_id)
    if(Array.isArray(state.assignments)){
      const asg={}; state.assignments.forEach(a=>{ if(a&&a.interceptor_id!=null) asg[a.interceptor_id]=a.track_id; });
      SIM.interceptors.forEach(c=>{ if(c.id in asg) c.target=asg[c.id]; });
    }

    // threats meta (severity / eta)
    const meta={}; (state.threats||[]).forEach(th=>{ if(th&&th.track_id!=null) meta[th.track_id]={severity:th.severity, eta:th.eta_seconds}; });

    // tracks
    const seenT=new Set();
    (state.tracks||[]).forEach(d=>{
      if(!d || d.track_id==null) return;
      const id=d.track_id; seenT.add(id);
      let s=SIM.shaheds.find(x=>x.id===id);
      if(!s){ s={ id, trail:[], alive:true, born:SIM.t }; SIM.shaheds.push(s); }
      const pos=d.position||[SITE_ABS,SITE_ABS,0];
      s.x=(+pos[0]||SITE_ABS)-SITE_ABS; s.y=(+pos[1]||SITE_ABS)-SITE_ABS; s.z=+pos[2]||0;
      const v=d.velocity||[0,0,0]; s.vx=+v[0]||0; s.vy=+v[1]||0; s.vz=+v[2]||0;
      s.alive=d.alive!==false;
      const m=meta[id]||{};
      s._eta = d.eta_seconds!=null ? +d.eta_seconds : (m.eta!=null?+m.eta:undefined);
      s._severity = m.severity!=null ? +m.severity : undefined;
      if(SIM.t-(s._tt||0)>0.18){ s._tt=SIM.t; s.trail.push([s.x,s.y]); if(s.trail.length>26) s.trail.shift(); }
    });
    for(let i=SIM.shaheds.length-1;i>=0;i--) if(!seenT.has(SIM.shaheds[i].id)) SIM.shaheds.splice(i,1);

    // events -> log + fx + stats (deduped by timestamp|interceptor|track)
    (state.events||[]).forEach(ev=>{
      if(!ev) return;
      const key=(ev.timestamp!=null?ev.timestamp:"")+"|"+(ev.interceptor_id||"")+"|"+(ev.track_id||"");
      if(SIM._extEvents.has(key)) return;
      SIM._extEvents.add(key); if(SIM._extEvents.size>1000) SIM._extEvents.clear();
      SIM.stats.shots++;
      const c=SIM.interceptors.find(x=>x.id===ev.interceptor_id);
      const s=SIM.shaheds.find(x=>x.id===ev.track_id);
      if(ev.success){
        SIM.stats.kills++;
        SIM.fx.push({type:"burst", x:s?s.x:0, y:s?s.y:0, t:0, dur:0.55});
        logEvent(`<b>${c?c.name:(ev.interceptor_id||"Interceptor")}</b> intercepted <b>${ev.track_id}</b> — <span class="ok">destroyed</span>`,"kill");
      }
    });

    // display Pk (geometry) for cards + assignment lines
    SIM.interceptors.forEach(c=>{
      const s=c.target?SIM.shaheds.find(x=>x.id===c.target&&x.alive):null;
      if(s){ const d=dist(c,s); const band=clamp(1-Math.abs(d-c.range*0.5)/c.range,0.25,1);
        c.curPk = d<=c.range ? clamp(c.pk*band,0.3,0.97) : clamp(c.pk*band*0.5,0.1,0.5); }
      else c.curPk=0;
    });
  }

  // serialise the live internal state to the documented schema (absolute coords)
  function snapshotFromSim(){
    return {
      tracks: SIM.shaheds.map(s=>({ track_id:s.id, position:[Math.round(s.x+SITE_ABS),Math.round(s.y+SITE_ABS),0],
        velocity:[+(s.vx||0).toFixed(1),+(s.vy||0).toFixed(1),0], eta_seconds:+eta(s).toFixed(1), alive:s.alive!==false })),
      threats: SIM.shaheds.filter(s=>s.alive!==false).map(s=>({ track_id:s.id, severity:+score(s).toFixed(2), eta_seconds:+eta(s).toFixed(1) })),
      interceptors: SIM.interceptors.map(c=>({ interceptor_id:c.id, position:[Math.round(c.x+SITE_ABS),Math.round(c.y+SITE_ABS),0],
        status:c.state, target_track_id:c.target||null, alive:c.alive!==false })),
      assignments: SIM.interceptors.filter(c=>c.target).map(c=>({ interceptor_id:c.id, track_id:c.target })),
      events: SIM.events.slice(-30),
    };
  }

  function refreshPanels(){
    if(!document.querySelector("#threats")) return;
    updateStats(); buildThreats(); buildIntc(); buildLog(); refreshWhy();
  }

  window.__COP_setData = function(state){
    window.__COP_STATE = state || window.__COP_STATE;
    window.__COP_EXTERNAL = true;            // receiving data implies external mode
    applyExternal(window.__COP_STATE);
    refreshPanels();
    return window.__COP_STATE;
  };

  // Inject the static map geometry (defended site, ground station, radars) coming
  // from the sim config. World metres are recentred on the defended site, matching
  // the [pos - SITE_ABS] convention applyExternal() uses for tracks/interceptors.
  window.__COP_setScenario = function(geo){
    if(!geo) return;
    const site = geo.defended_site || [SITE_ABS,SITE_ABS,0];
    const ox = +site[0]||SITE_ABS, oy = +site[1]||SITE_ABS;
    const rel = p => [ (+(p&&p[0])||ox)-ox, (+(p&&p[1])||oy)-oy ];
    SCENARIO = {
      siteRel: rel(site),
      gsRel: geo.ground_station ? rel(geo.ground_station) : null,
      radars: (geo.radars||[]).map(r=>{ const [x,y]=rel(r.position); return { id:r.radar_id, x, y, range:+r.range||0 }; }),
    };
  };

  // ============================================================
  //  BOOT + LOOPS
  // ============================================================
  function boot(){
    cv=$("#map"); ctx=cv.getContext("2d");
    fit(); window.addEventListener("resize",fit);
    wireControls(); wireMap();
    addInterceptor(); addInterceptor();
    logEvent("System ready · 2 interceptors on station","mut");
    setRunUI();

    // render loop (always animating: sweep + fx). Internal sim runs only when not externally fed.
    let last=performance.now();
    function frame(){
      const now=performance.now(), dt=Math.min(0.05,(now-last)/1000); last=now;
      SIM.t+=dt;
      if (!window.__COP_EXTERNAL) stepSim(dt);
      stepFx(dt);
      if (!window.__COP_EXTERNAL) window.__COP_STATE = snapshotFromSim();  // keep the live snapshot exposed
      if (SIM.sel.kind==="threat" && !SIM.shaheds.find(s=>s.id===SIM.sel.id&&s.alive)){ SIM.sel={kind:null,id:null}; refreshWhy(); }
      render();
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    // panel refresh (throttled)
    setInterval(()=>{ updateStats(); buildThreats(); buildIntc(); buildLog(); refreshWhy(); }, 220);
  }

  if (document.readyState==="loading") document.addEventListener("DOMContentLoaded",boot); else boot();
})();
</script>
  <script type="module" src="/src/main.ts"></script>
